name: Hangrt Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Deploy jar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/Han-Geureut-BackEnd-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/app/"
          strip_components: 2

      - name: Restart application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 3m
          script: |
            set -e
            echo "=========================================="
            echo "🚀 HanGeureut 백엔드 배포"
            echo "=========================================="
            
            # JAR 파일 확인
            ls -lh /home/ubuntu/app/Han-Geureut-BackEnd-0.0.1-SNAPSHOT.jar
            
            # 서비스 재시작
            echo "🔄 서비스 재시작..."
            sudo systemctl restart hangeureut
            
            # 시작 대기
            echo "⏳ 대기 중 (15초)..."
            sleep 15
            
            # 상태 확인
            if sudo systemctl is-active --quiet hangeureut; then
              echo "✅ 배포 성공!"
              sudo systemctl status hangeureut --no-pager -l
              echo "=========================================="
              echo "📄 최근 로그:"
              tail -n 20 /home/ubuntu/app.log
              echo "=========================================="
            else
              echo "❌ 배포 실패!"
              sudo systemctl status hangeureut --no-pager -l || true
              sudo journalctl -u hangeureut -n 50 --no-pager
              exit 1
            fi