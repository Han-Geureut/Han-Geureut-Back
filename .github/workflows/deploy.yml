name: Hangrt Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Deploy jar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/han-geureut-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/app/"
          strip_components: 2

      - name: Restart application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            pkill -f "han-geureut" || true
            sleep 3
            nohup java -jar \
              -Dspring.config.location=/home/ubuntu/config/application.yml \
              /home/ubuntu/app/han-geureut-0.0.1-SNAPSHOT.jar \
              > /home/ubuntu/app.log 2>&1 &
            echo "백엔드 배포 완료"